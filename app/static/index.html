<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Somerville Ordinance Assistant</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h1>Somerville Ordinance Assistant</h1>
      <p class="disclaimer">This tool provides general information, not legal advice. Always confirm details with official City of Somerville sources before making decisions.</p>

    </aside>

    <main class="chat-area">
      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="chat-form" class="composer">
        <textarea
          id="prompt"
          name="prompt"
          rows="3"
          placeholder="Ask about Somerville law…"
          required
        ></textarea>
        <div class="composer-row">
          <button id="send" type="submit">Send</button>
          <span class="hint">Shift+Enter for newline</span>
        </div>
      </form>
    </main>
  </div>

  <template id="message-template">
    <article class="message">
      <header>
        <span class="role"></span>
        <span class="meta"></span>
      </header>
      <div class="content"></div>
      <section class="citations"></section>
    </article>
  </template>

  <script src="/static/app.js" defer></script>
</body>
</html>
